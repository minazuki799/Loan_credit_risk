name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  wake-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Wake Streamlit App with Selenium
        run: |
          python - <<EOF
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from webdriver_manager.python import ChromeDriverManager
          import time

          # Setup headless Chrome
          options = Options()
          options.add_argument("--headless")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          options.add_argument("--disable-gpu")

          driver = webdriver.Chrome(
              service=Service(ChromeDriverManager().install()),
              options=options
          )

          try:
              print("Opening Streamlit app...")
              driver.get("https://loancreditrisk-kpprxkmo2vyrmjumjukc9t.streamlit.app/")

              # Wait for page to load
              time.sleep(15)

              # Check if app is sleeping and click wake button if present
              try:
                  wake_button = driver.find_element(By.XPATH, "//button[contains(text(), 'Yes, get this app back up')]")
                  wake_button.click()
                  print("Clicked wake button — app was sleeping")
                  time.sleep(15)
              except:
                  print("App was already awake — no action needed")

              print(f"Page title: {driver.title}")
              print("✅ App successfully visited")

          finally:
              driver.quit()
          EOF